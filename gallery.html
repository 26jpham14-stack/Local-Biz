<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery | Avila's El Ranchito</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 4x4 Grid Logic */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .gallery-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.4s ease;
            filter: grayscale(20%);
        }
        .gallery-grid img:hover {
            filter: grayscale(0%);
            transform: scale(1.02);
        }

        /* Lightbox Overlay Style */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            border: 2px solid var(--accent-gold);
        }
        #close-btn {
            position: absolute;
            top: 40px; right: 40px;
            color: white; font-size: 30px; cursor: pointer;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <nav>
        <h1>AVILA'S</h1>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="story.html">Heritage</a>
            <a href="menu.html">The Kitchen</a>
            <a href="gallery.html">Gallery</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 3rem; text-align: center; margin-bottom: 50px;">GALLERY</h2>
        
        <div class="gallery-grid">
            <img src="https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1593504049359-7b7d923b5c10?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1552332386-f8dd00dc2f85?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1582169542910-6c1a5c0cdd64?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1613514785940-daed07799d9b?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1599974590211-59cf1b290c1e?w=600" onclick="openLightbox(this.src)">
            <img src="https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=600" onclick="openLightbox(this.src)">
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span id="close-btn">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>

    <footer>
        <p style="color: var(--accent-gold);">&copy; 2026 AVILA'S EL RANCHITO</p>
    </footer>
</body>
</html>
