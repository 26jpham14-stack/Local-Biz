<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hearth & Stone | Artisanal Bakery</title>
    <style>
        :root {
            --primary: #2d2d2d;
            --accent: #c5a059;
            --light: #f9f9f7;
        }
        body { font-family: 'Georgia', serif; margin: 0; color: var(--primary); background: var(--light); }
        nav { display: flex; justify-content: space-between; padding: 2rem 5%; align-items: center; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .hero { height: 60vh; background: #e0e0e0; display: flex; align-items: center; justify-content: center; text-align: center; }
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 15px; padding: 5%; 
        }
        .gallery-grid img { width: 100%; height: 300px; object-fit: cover; border-radius: 4px; transition: transform 0.3s; }
        .gallery-grid img:hover { transform: scale(1.02); }
        footer { text-align: center; padding: 3rem; background: var(--primary); color: white; margin-top: 50px; }
    </style>
</head>
<body>

    <nav>
        <h2>HEARTH & STONE</h2>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="story.html">Our Story</a>
            <a href="menu.html">Menu</a>
            <a href="gallery.html">Gallery</a>
        </div>
    </nav>

    <section class="gallery-grid">
        <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff" alt="Sourdough">
        </section>

    <footer>
        <p>&copy; 2026 The Hearth & Stone Bakery | 123 Artisan Way</p>
    </footer>

</body>
</html>
